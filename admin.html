<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Lab 718</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --text: #f8fafc;
            --accent: #22c55e;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at top right, #1e3a8a, transparent),
                radial-gradient(circle at bottom left, #1e1b4b, transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        #login-screen {
            text-align: center;
            max-width: 350px;
        }

        #admin-content {
            display: none;
        }

        h1, h2, h3 { margin-bottom: 1.5rem; }
        
        h1 {
            font-size: 2rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--secondary); font-weight: 600; }
        
        input, select {
            width: 100%;
            padding: 0.8rem;
            background: #2d3748;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 0.5rem;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .btn-action {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4); }
        .btn-action:active { transform: translateY(0); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.5rem;
        }

        #participant-selectors {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .admin-section-divider {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin: 2rem 0 1rem 0;
            padding-top: 1rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 1px;
        }

        .task-list {
            margin-top: 1rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-row {
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .task-row-project { color: var(--primary); font-weight: 700; font-size: 0.8rem; }
        .task-row-desc { font-size: 0.9rem; }
        .task-row-actions { display: flex; gap: 5px; margin-top: 4px; }

        .btn-edit {
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 5px;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-restore {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .btn-finish-quick {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .btn-finish-quick:hover {
            background: #22c55e;
            color: white;
        }

        .btn-reopen {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .header-nav {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .btn-back {
            color: var(--secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
        }

        .btn-back:hover { color: var(--text); }
        
        #pass-error { color: #ef4444; font-size: 0.85rem; margin-top: 0.5rem; display: none; }

        /* Estilos para a Grade de Escalas */
        .schedule-grid-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 1rem;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 0.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 44px repeat(5, 1fr);
            gap: 4px;
        }
        .grid-header { text-align: center; font-size: 0.7rem; color: var(--primary); font-weight: 800; padding: 5px; }
        .grid-time { font-size: 0.7rem; color: var(--secondary); display: flex; align-items: center; justify-content: center; }
        .grid-cell {
            height: 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: transparent;
        }
        .grid-cell:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }
        .grid-cell.active { background: var(--accent); color: white; border-color: var(--accent); font-weight: bold; }
        .grid-cell.pending-add { background: #f59e0b; color: white; border-color: #f59e0b; animation: pulse 1.5s infinite; }
        .grid-cell.pending-remove { background: #ef4444; color: white; border-color: #ef4444; text-decoration: line-through; }
        .grid-cell.loading { opacity: 0.5; pointer-events: none; }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 0.75rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(12px);
            max-width: 340px;
            text-align: center;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
        }
        .toast-success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #22c55e; }
        .toast-error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.4);  color: #ef4444; }
        .toast-warn    { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.4); color: #f59e0b; }
        @keyframes toastIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        @keyframes toastOut { from { opacity:1; } to { opacity:0; } }
    </style>
</head>
<body>

    <div class="header-nav">
        <a href="index.html" class="btn-back">← Voltar ao Painel</a>
        <h1>Administração</h1>
        <button id="logout-btn" onclick="logout()" style="display:none; background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.3); padding:6px 14px; border-radius:8px; cursor:pointer; font-size:0.85rem; font-weight:600;">Sair</button>
    </div>

    <!-- Tela de Login -->
    <div id="login-screen" class="container">
        <h3>Acesso Restrito</h3>
        <div class="form-group">
            <input type="password" id="admin-pass" placeholder="PIN de Acesso" autocomplete="current-password">
            <p id="pass-error" style="color:#ef4444; font-size:0.85rem; margin-top:0.5rem; display:none;">PIN incorreto!</p>
        </div>
        <button class="btn-action" id="login-btn">Entrar</button>
    </div>

    <!-- Conteúdo Admin -->
    <div id="admin-content" class="container">
        
        <div class="admin-section-divider">Gerenciar Tarefas</div>
        <button class="btn-action btn-secondary" id="btn-toggle-task-form" onclick="toggleTaskForm()" style="margin-bottom: 2rem;">+ Criar Nova Tarefa</button>

        <div id="task-form-section" style="display: none; background: rgba(0,0,0,0.1); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 2.5rem;">
            <div class="form-group">
                <label>Projeto</label>
                <select id="task-project"></select>
            </div>

            <div class="form-group">
                <label>O que precisa ser feito?</label>
                <input type="text" id="task-desc" placeholder="Descrição da tarefa">
            </div>

            <div class="form-group">
                <label>Responsáveis</label>
                <div id="participant-selectors"></div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px;">
                <div class="form-group">
                    <label>Data de Início</label>
                    <input type="date" id="task-start">
                </div>
                <div class="form-group">
                    <label>Prazo Final (Opcional)</label>
                    <input type="date" id="task-deadline">
                </div>
            </div>

            <div class="form-group">
                <label>Prioridade</label>
                <select id="task-priority">
                    <option value="baixa">Baixa</option>
                    <option value="media" selected>Média</option>
                    <option value="alta">Alta</option>
                </select>
            </div>

            <button class="btn-action" id="save-task-btn">Salvar Tarefa</button>
            <button class="btn-action btn-secondary" id="cancel-edit-btn" style="display: none;">Cancelar Edição</button>
            <button class="btn-action" id="finish-task-btn" style="display: none; background: var(--accent); color: white;">Tarefa Concluída</button>
        </div>

        <div class="admin-section-divider">Horários Individuais</div>
        <button class="btn-action btn-secondary" onclick="toggleScheduleAdmin()" style="margin-bottom: 2rem;">Gerenciar Horários (Escalas)</button>

        <div id="schedule-admin-section" style="display: none; background: rgba(0,0,0,0.2); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 2rem;">
            <div class="form-group">
                <label>Selecione o Bolsista</label>
                <select id="schedule-bolsista-select" onchange="loadBolsistaSchedule()"></select>
            </div>
            <p style="font-size: 0.7rem; color: var(--secondary); margin-bottom: 0.5rem; text-align: center;">Clique nos blocos para adicionar ou remover horários</p>
            <div class="schedule-grid-wrapper"><div id="admin-schedule-grid" class="schedule-grid"></div></div>
            <div id="schedule-save-container" style="display:none; margin-top: 1.5rem; gap: 10px;">
                <button class="btn-action" id="btn-save-escala" onclick="saveBolsistaSchedule(this)" style="background: var(--accent); color: white;">Confirmar Alterações de Horário</button>
                <button class="btn-action btn-secondary" onclick="loadBolsistaSchedule()" style="margin-top:0;">Descartar Rascunho</button>
            </div>
        </div>

        <div class="admin-section-divider">Quadro de Avisos</div>
        <div style="background: rgba(255, 255, 255, 0.03); padding: 1.5rem; border-radius: 1rem; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 2rem;">
            <div class="form-group">
                <label>Texto do Aviso</label>
                <input type="text" id="new-aviso-texto" placeholder="Ex: Reunião geral hoje às 14h no Lab.">
            </div>
            <div class="form-group">
                <label>Data de Exibição</label>
                <input type="date" id="new-aviso-data">
            </div>
            <button class="btn-action" id="add-aviso-btn">Adicionar Aviso</button>
            <div id="avisos-list" style="margin-top: 1.5rem;"></div>
        </div>

        <div class="admin-section-divider">Tarefas Ativas <span id="badge-ativas" style="background:var(--primary);color:#0f172a;border-radius:12px;padding:1px 8px;font-size:0.75rem;margin-left:6px;">0</span></div>
        <input type="text" id="task-search" placeholder="Filtrar por descrição ou projeto..." oninput="filterTasks(this.value)" style="margin-bottom:1rem;">
        <div id="tasks-active" class="task-list"></div>

        <div class="admin-section-divider">Concluídas Recentemente <span id="badge-concluidas" style="background:rgba(255,255,255,0.1);color:var(--secondary);border-radius:12px;padding:1px 8px;font-size:0.75rem;margin-left:6px;">0</span></div>
        <div id="tasks-finished" class="task-list" style="opacity: 0.6;"></div>

        <div style="margin-top: 2rem; text-align: center;">
            <button class="btn-action btn-secondary" style="width: auto; font-size: 0.8rem; padding: 5px 15px;" onclick="toggleTrash()">Ver Lixeira (Tarefas Excluídas)</button>
        </div>
        <div id="trash-section" style="display: none; border: 1px dashed rgba(255,0,0,0.2); border-radius: 1rem; padding: 1rem; margin-top: 1rem;">
            <p style="font-size: 0.7rem; color: #ef4444; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">Recipientes de Backup (Lixeira)</p>
            <div id="tasks-excluida" class="task-list" style="opacity: 0.5;"></div>
        </div>
    </div>

    <!-- Modal de Confirmação -->
    <div id="confirm-modal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.88); backdrop-filter:blur(8px); z-index:2000; align-items:center; justify-content:center; padding:1rem;">
        <div style="background:var(--card-bg); border:1px solid rgba(255,255,255,0.1); border-radius:1.2rem; padding:1.8rem 1.5rem; width:100%; max-width:340px; text-align:center; animation:toastIn 0.2s ease;">
            <p id="confirm-message" style="font-size:1rem; margin-bottom:1.5rem; line-height:1.5; color:var(--text);"></p>
            <div style="display:flex; gap:10px;">
                <button id="confirm-cancel" class="btn-action btn-secondary" style="flex:1;">Cancelar</button>
                <button id="confirm-ok" class="btn-action" style="flex:1;">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://vnodbsefjwvapvtdzgdl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZub2Ric2Vmand2YXB2dGR6Z2RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzI5NTMsImV4cCI6MjA4ODk0ODk1M30.M-7v57-obulKagTn-p5Pp6oKJWwcuu5FIvSLJ6andvs';
        const EDGE_URL = SUPABASE_URL + '/functions/v1/admin-action';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let adminPin = sessionStorage.getItem('adminPin') || null;

        async function adminAction(action, payload = {}) {
            const res = await fetch(EDGE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
                body: JSON.stringify({ pin: adminPin, action, payload })
            });
            const data = await res.json();
            if (!res.ok || data.error) throw new Error(data.error || 'Erro desconhecido');
            return data;
        }

        function confirmModal(message, confirmText = 'Confirmar', confirmStyle = '') {
            return new Promise(resolve => {
                const modal = document.getElementById('confirm-modal');
                document.getElementById('confirm-message').textContent = message;
                const okBtn = document.getElementById('confirm-ok');
                okBtn.textContent = confirmText;
                okBtn.style.cssText = confirmStyle || '';
                modal.style.display = 'flex';
                const close = (result) => { modal.style.display = 'none'; resolve(result); };
                okBtn.onclick = () => close(true);
                document.getElementById('confirm-cancel').onclick = () => close(false);
            });
        }

        function toast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function sanitize(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str ?? ''));
            return div.innerHTML;
        }

        let activeTasks = [];
        let finishedTasks = [];
        let deletedTasks = [];
        let allParticipants = [];
        let originalScales = []; // Horários vindos do banco
        let pendingScales = [];  // Rascunho local sugerido
        let projectsList = [];
        let editingTaskId = null;
        let taskFilter = '';

        // Login Logic
        const loginBtn = document.getElementById('login-btn');
        const passInput = document.getElementById('admin-pass');
        const passError = document.getElementById('pass-error');

        function checkAuth() {
            const isAuthenticated = sessionStorage.getItem('isAdminAuthenticated') === 'true';
            if (isAuthenticated) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                document.getElementById('logout-btn').style.display = 'block';
                init();
            }
        }

        loginBtn.onclick = async () => {
            const pin = passInput.value;
            if (!pin) return;
            loginBtn.disabled = true;
            loginBtn.textContent = 'Verificando...';
            try {
                adminPin = pin;
                await adminAction('validate');
                sessionStorage.setItem('isAdminAuthenticated', 'true');
                sessionStorage.setItem('adminPin', pin);
                checkAuth();
            } catch(e) {
                adminPin = null;
                passError.textContent = 'PIN incorreto!';
                passError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        };

        function logout() {
            adminPin = null;
            sessionStorage.removeItem('isAdminAuthenticated');
            sessionStorage.removeItem('adminPin');
            document.getElementById('admin-content').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'none';
            passInput.value = '';
        }

        passInput.onkeydown = (e) => { if (e.key === 'Enter') loginBtn.click(); };

        // Data Logic
        async function loadData() {
            const { data: projs } = await supabaseClient.from('projetos').select('*').order('nome');
            projectsList = projs || [];
            const select = document.getElementById('task-project');
            select.innerHTML = '<option value="">-- Selecione um projeto --</option>' + projectsList.map(p => `<option value="${p.id}">${sanitize(p.nome)}</option>`).join('');
            select.innerHTML += '<option value="NEW_PROJECT">+ Novo Projeto...</option>';

            const { data: parts } = await supabaseClient.from('bolsistas').select('*').order('nome');
            allParticipants = parts || [];
            renderParticipants();

            // Popular select de horários
            const schedSelect = document.getElementById('schedule-bolsista-select');
            schedSelect.innerHTML = '<option value="">-- Selecione um bolsista --</option>' +
                allParticipants.map(p => `<option value="${p.id}">${sanitize(p.nome)}</option>`).join('');
            
            const grid = document.getElementById('admin-schedule-grid');
            grid.innerHTML = '<div style="grid-column: span 6; text-align: center; padding: 20px; font-size: 0.8rem; opacity: 0.5;">Selecione um bolsista acima para editar a escala.</div>';

            // Carregar avisos
            const { data: avisosList } = await supabaseClient.from('avisos').select('*').order('data_exibicao').order('created_at');
            renderAvisosList(avisosList || []);

            // Definir data padrão de início como hoje
            document.getElementById('task-start').value = new Date().toISOString().split('T')[0];
        }

        async function loadBolsistaSchedule() {
            const bolsistaId = document.getElementById('schedule-bolsista-select').value;
            const grid = document.getElementById('admin-schedule-grid');
            const saveBtnCont = document.getElementById('schedule-save-container');

            if (!bolsistaId) {
                grid.innerHTML = '<div style="grid-column: span 6; text-align: center; padding: 20px; font-size: 0.8rem; opacity: 0.5;">Selecione um bolsista acima para editar a escala.</div>';
                saveBtnCont.style.display = 'none';
                return;
            }

            grid.innerHTML = '<div style="grid-column: span 6; text-align: center; padding: 20px; font-size: 0.8rem;">Carregando escala...</div>';
            saveBtnCont.style.display = 'none';

            const { data } = await supabaseClient.from('escalas').select('*').eq('bolsista_id', bolsistaId);
            originalScales = data || [];
            pendingScales = JSON.parse(JSON.stringify(originalScales)); // Clonar para o rascunho
            renderScheduleGrid();
        }

        function renderScheduleGrid() {
            const grid = document.getElementById('admin-schedule-grid');
            const saveBtnCont = document.getElementById('schedule-save-container');
            
            let html = '<div></div>'; 
            const days = ["SEG", "TER", "QUA", "QUI", "SEX"];
            days.forEach(d => html += `<div class="grid-header">${d}</div>`);

            for (let h = 8; h <= 19; h++) {
                html += `<div class="grid-time">${h}:00</div>`;
                for (let d = 1; d <= 5; d++) {
                    const isOriginal = originalScales.some(s => s.dia_semana === d && h >= s.hora_inicio && h < s.hora_fim);
                    const isPending = pendingScales.some(s => s.dia_semana === d && h >= s.hora_inicio && h < s.hora_fim);
                    
                    let cellClass = "";
                    let cellText = "";
                    
                    if (isOriginal && isPending) { cellClass = "active"; cellText = "OK"; }
                    else if (!isOriginal && isPending) { cellClass = "pending-add"; cellText = "+"; }
                    else if (isOriginal && !isPending) { cellClass = "pending-remove"; cellText = "X"; }

                    html += `<div class="grid-cell ${cellClass}" onclick="toggleHourDraft(${d}, ${h})">${cellText}</div>`;
                }
            }
            grid.innerHTML = html;

            // Mostrar botão de salvar apenas se houver diferenças
            const hasChanges = JSON.stringify(originalScales.sort((a,b)=>a.dia_semana-b.dia_semana || a.hora_inicio-b.hora_inicio)) !== 
                               JSON.stringify(pendingScales.sort((a,b)=>a.dia_semana-b.dia_semana || a.hora_inicio-b.hora_inicio));
            saveBtnCont.style.display = hasChanges ? 'flex' : 'none';
        }

        function toggleHourDraft(day, hour) {
            const idx = pendingScales.findIndex(s => s.dia_semana === day && hour >= s.hora_inicio && hour < s.hora_fim);
            
            if (idx > -1) {
                pendingScales.splice(idx, 1);
            } else {
                pendingScales.push({ dia_semana: day, hora_inicio: hour, hora_fim: hour + 1 });
            }
            renderScheduleGrid();
        }

        async function saveBolsistaSchedule(btn) {
            const bolsistaId = document.getElementById('schedule-bolsista-select').value;
            if (!bolsistaId) return;

            if (btn) { btn.disabled = true; btn.textContent = 'Salvando...'; }
            try {
                const toRemove = originalScales.filter(o => !pendingScales.some(p => p.dia_semana === o.dia_semana && p.hora_inicio === o.hora_inicio));
                const toAdd = pendingScales.filter(p => !originalScales.some(o => o.dia_semana === p.dia_semana && o.hora_inicio === p.hora_inicio));
                await adminAction('save_schedule', {
                    bolsista_id: bolsistaId,
                    to_remove: toRemove.map(r => r.id),
                    to_add: toAdd
                });
                toast("Escala atualizada com sucesso!");
                await loadBolsistaSchedule();
            } catch (e) {
                toast("Erro ao salvar escala: " + e.message, 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Confirmar Alterações de Horário'; }
            }
        }

        function toggleScheduleAdmin() {
            const el = document.getElementById('schedule-admin-section');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        function toggleTaskForm() {
            const el = document.getElementById('task-form-section');
            const btn = document.getElementById('btn-toggle-task-form');
            if (el.style.display === 'none') {
                el.style.display = 'block';
                btn.innerText = 'Fechar Formulário';
            } else {
                if (editingTaskId) {
                    cancelEdit();
                } else {
                    el.style.display = 'none';
                    btn.innerText = '+ Criar Nova Tarefa';
                }
            }
        }

        async function updateTasks() {
            const { data: active } = await supabaseClient.from('tarefas').select('*, projetos(nome)')
                .not('status', 'in', '("concluida","excluida")');
            
            if (active) {
                const priorityWeight = { 'alta': 1, 'media': 2, 'baixa': 3 };
                active.sort((a, b) => {
                    const pa = priorityWeight[a.prioridade?.toLowerCase()] || 4;
                    const pb = priorityWeight[b.prioridade?.toLowerCase()] || 4;
                    if (pa !== pb) return pa - pb;
                    const projA = (a.projetos?.nome || "").toLowerCase();
                    const projB = (b.projetos?.nome || "").toLowerCase();
                    if (projA !== projB) return projA.localeCompare(projB);
                    return (a.descricao || "").toLowerCase().localeCompare((b.descricao || "").toLowerCase());
                });
            }
            activeTasks = active || [];

            const { data: done } = await supabaseClient.from('tarefas').select('*, projetos(nome)')
                .eq('status', 'concluida')
                .order('created_at', { ascending: false }).limit(15);
            finishedTasks = done || [];

            const { data: trash } = await supabaseClient.from('tarefas').select('*, projetos(nome)')
                .eq('status', 'excluida')
                .order('created_at', { ascending: false });
            deletedTasks = trash || [];
        }

        function renderParticipants() {
            const container = document.getElementById('participant-selectors');
            container.innerHTML = allParticipants.map(p => `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <label style="display:flex; align-items:center; gap:10px; cursor:pointer; flex:1;">
                        <input type="checkbox" class="resp-checkbox" value="${sanitize(p.nome)}" style="width:auto;"> ${sanitize(p.nome)}
                    </label>
                    <span class="rename-btn" data-id="${p.id}" style="cursor:pointer; opacity:0.5;">✏️</span>
                </div>
            `).join('') + `<div onclick="addBolsista()" style="text-align:center; color:var(--primary); cursor:pointer; padding:10px; border:1px dashed var(--primary); margin-top:10px; border-radius:8px;">+ Adicionar Bolsista</div>`;
            container.querySelectorAll('.rename-btn').forEach(btn => {
                btn.onclick = () => {
                    const p = allParticipants.find(x => x.id == btn.dataset.id);
                    if (p) renameBolsista(p.id, p.nome);
                };
            });
        }

        function filterTasks(text) {
            taskFilter = text.toLowerCase();
            renderTasks();
        }

        function renderTasks() {
            const filtered = taskFilter
                ? activeTasks.filter(t =>
                    t.descricao?.toLowerCase().includes(taskFilter) ||
                    t.projetos?.nome?.toLowerCase().includes(taskFilter))
                : activeTasks;

            document.getElementById('badge-ativas').textContent = activeTasks.length;
            document.getElementById('badge-concluidas').textContent = finishedTasks.length;

            const activeContainer = document.getElementById('tasks-active');
            if (taskFilter && filtered.length === 0) {
                activeContainer.innerHTML = '<p style="font-size:0.8rem; text-align:center; opacity:0.5; padding:1rem;">Nenhuma tarefa encontrada.</p>';
            } else {
                activeContainer.innerHTML = filtered.map(t => `
                    <div class="task-row">
                        <div class="task-row-project">[${sanitize(t.projetos?.nome || '?')}]</div>
                        <div class="task-row-desc">${sanitize(t.descricao)}</div>
                        <div class="task-row-actions">
                            <button class="btn-edit btn-finish-quick" onclick="finishTaskQuickly('${t.id}', this)" title="Concluir">✓</button>
                            <button class="btn-edit" onclick="prepareEditById('${t.id}')">Editar</button>
                            <button class="btn-edit btn-delete" onclick="deleteTask('${t.id}', this)">🗑️</button>
                        </div>
                    </div>
                `).join('');
            }

            const finishedContainer = document.getElementById('tasks-finished');
            finishedContainer.innerHTML = finishedTasks.map(t => `
                <div class="task-row">
                    <div class="task-row-project" style="text-decoration:line-through;">[${sanitize(t.projetos?.nome || '?')}]</div>
                    <div class="task-row-desc" style="text-decoration:line-through;">${sanitize(t.descricao)}</div>
                    <div class="task-row-actions">
                        <button class="btn-edit btn-reopen" onclick="reopenTask('${t.id}', this)">Reabrir</button>
                        <button class="btn-edit btn-delete" onclick="deleteTask('${t.id}', this)">🗑️</button>
                    </div>
                </div>
            `).join('');

            const exContainer = document.getElementById('tasks-excluida');
            exContainer.innerHTML = deletedTasks.map(t => `
                <div class="task-row">
                    <div class="task-row-project">[${sanitize(t.projetos?.nome || '?')}]</div>
                    <div class="task-row-desc">${sanitize(t.descricao)}</div>
                    <div class="task-row-actions"><button class="btn-edit btn-restore" onclick="restoreTask('${t.id}', this)">Restaurar</button></div>
                </div>
            `).join('');
            if (deletedTasks.length === 0) exContainer.innerHTML = '<p style="font-size:0.7rem; text-align:center;">Lixeira vazia</p>';
        }

        function toggleTrash() {
            const el = document.getElementById('trash-section');
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }

        async function prepareEdit(task) {
            editingTaskId = task.id;
            document.getElementById('task-project').value = task.projeto_id;
            document.getElementById('task-desc').value = task.descricao;
            document.getElementById('task-start').value = task.data_inicio || '';
            document.getElementById('task-deadline').value = task.prazo || '';
            document.getElementById('task-priority').value = task.prioridade || 'media';
            document.querySelectorAll('.resp-checkbox').forEach(cb => cb.checked = (task.responsaveis || []).includes(cb.value));
            
            // Garantir que o formulário esteja visível ao editar
            document.getElementById('task-form-section').style.display = 'block';
            document.getElementById('btn-toggle-task-form').innerText = 'Editando Tarefa';
            
            document.getElementById('save-task-btn').innerText = 'Salvar Alterações';
            document.getElementById('cancel-edit-btn').style.display = 'block';
            document.getElementById('finish-task-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editingTaskId = null;
            document.getElementById('task-desc').value = '';
            document.getElementById('task-start').value = new Date().toISOString().split('T')[0];
            document.getElementById('task-deadline').value = '';
            document.getElementById('task-priority').value = 'media';
            document.querySelectorAll('.resp-checkbox').forEach(cb => cb.checked = false);
            
            document.getElementById('task-form-section').style.display = 'none';
            document.getElementById('btn-toggle-task-form').innerText = '+ Criar Nova Tarefa';
            
            document.getElementById('save-task-btn').innerText = 'Salvar Tarefa';
            document.getElementById('cancel-edit-btn').style.display = 'none';
            document.getElementById('finish-task-btn').style.display = 'none';
        }

        async function saveTask() {
            const projeto_id = document.getElementById('task-project').value;
            const descricao = document.getElementById('task-desc').value.trim();
            const resps = Array.from(document.querySelectorAll('.resp-checkbox:checked')).map(cb => cb.value);
            const data_inicio = document.getElementById('task-start').value || new Date().toISOString().split('T')[0];
            const prazo = document.getElementById('task-deadline').value || null;
            const prioridade = document.getElementById('task-priority').value;

            if (!projeto_id || projeto_id === 'NEW_PROJECT') return toast("Selecione um projeto!", 'warn');
            if (!descricao) return toast("Preencha a descrição da tarefa!", 'warn');
            if (resps.length === 0) return toast("Selecione ao menos um responsável!", 'warn');
            if (prazo && data_inicio && prazo < data_inicio) return toast("O prazo não pode ser anterior à data de início!", 'warn');

            const saveBtn = document.getElementById('save-task-btn');
            saveBtn.disabled = true;
            saveBtn.textContent = 'Salvando...';
            try {
                if (editingTaskId) {
                    await adminAction('update_task', { id: editingTaskId, projeto_id, descricao, responsaveis: resps, data_inicio, prazo, prioridade });
                    toast("Tarefa atualizada!");
                } else {
                    await adminAction('create_task', { projeto_id, descricao, responsaveis: resps, data_inicio, prazo, prioridade });
                    toast("Tarefa criada!");
                }
                cancelEdit();
                await updateTasks();
                renderTasks();
            } catch (e) {
                toast(e.message, 'error');
                saveBtn.disabled = false;
                saveBtn.textContent = editingTaskId ? 'Salvar Alterações' : 'Salvar Tarefa';
            }
        }

        async function finishTask() {
            if (!editingTaskId) return;
            finishTaskQuickly(editingTaskId);
        }

        function prepareEditById(id) {
            const task = activeTasks.find(t => t.id === id);
            if (task) prepareEdit(task);
        }

        async function finishTaskQuickly(id, btn) {
            const task = activeTasks.find(t => t.id === id);
            const desc = task?.descricao || '';
            if (!await confirmModal(`Marcar como concluída?\n"${desc}"`, 'Concluir', 'background: var(--accent); color: white; flex:1;')) return;
            if (btn) { btn.disabled = true; btn.textContent = '...'; }
            try {
                await adminAction('complete_task', { id });
                if (editingTaskId === id) cancelEdit();
                await updateTasks();
                renderTasks();
            } catch (e) {
                toast("Erro: " + e.message, 'error');
                if (btn) { btn.disabled = false; btn.textContent = '✓'; }
            }
        }

        async function deleteTask(id, btn) {
            if (!await confirmModal("Mover tarefa para a lixeira?", 'Mover para Lixeira', 'background: rgba(239,68,68,0.8); color: white; flex:1;')) return;
            if (btn) { btn.disabled = true; btn.textContent = '...'; }
            try {
                await adminAction('delete_task', { id });
                await updateTasks();
                renderTasks();
            } catch (e) {
                toast("Erro ao mover para lixeira: " + e.message, 'error');
                if (btn) { btn.disabled = false; btn.textContent = '🗑️'; }
            }
        }

        async function restoreTask(id, btn) {
            if (btn) { btn.disabled = true; btn.textContent = '...'; }
            try {
                await adminAction('restore_task', { id });
                await updateTasks();
                renderTasks();
            } catch (e) {
                toast("Erro ao restaurar: " + e.message, 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Restaurar'; }
            }
        }

        async function reopenTask(id, btn) {
            if (btn) { btn.disabled = true; btn.textContent = '...'; }
            try {
                await adminAction('reopen_task', { id });
                await updateTasks();
                renderTasks();
            } catch (e) {
                toast("Erro ao reabrir: " + e.message, 'error');
                if (btn) { btn.disabled = false; btn.textContent = 'Reabrir'; }
            }
        }

        async function addBolsista() {
            const n = prompt("Nome do bolsista:");
            if (n) {
                try {
                    await adminAction('add_bolsista', { nome: n });
                    await loadData();
                } catch(e) { toast("Erro: " + e.message, 'error'); }
            }
        }

        async function renameBolsista(id, old) {
            const n = prompt("Novo nome:", old);
            if (n && n !== old) {
                try {
                    await adminAction('rename_bolsista', { id, nome: n });
                    await loadData();
                } catch(e) { toast("Erro: " + e.message, 'error'); }
            }
        }

        document.getElementById('task-project').onchange = async (e) => {
            if (e.target.value === 'NEW_PROJECT') {
                const n = prompt("Nome do projeto:");
                if (n) {
                    try {
                        await adminAction('add_project', { nome: n });
                        await loadData();
                    } catch(e) { toast("Erro: " + e.message, 'error'); e.target.value = ''; }
                } else { e.target.value = ''; }
            }
        };

        document.getElementById('save-task-btn').onclick = saveTask;
        document.getElementById('cancel-edit-btn').onclick = cancelEdit;
        document.getElementById('finish-task-btn').onclick = finishTask;

        function renderAvisosList(avisos) {
            const list = document.getElementById('avisos-list');
            if (!avisos || avisos.length === 0) {
                list.innerHTML = '<p style="font-size: 0.8rem; color: var(--secondary); text-align: center; margin-top: 0.5rem;">Nenhum aviso cadastrado.</p>';
                return;
            }
            list.innerHTML = avisos.map(a => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1rem; background: rgba(255,255,255,0.04); border-radius: 0.5rem; margin-bottom: 0.5rem; gap: 1rem;">
                    <div style="flex: 1; min-width: 0;">
                        <span style="font-size: 0.75rem; color: #fbbf24; font-weight: 600;">${new Date(a.data_exibicao + 'T12:00:00').toLocaleDateString('pt-BR')}</span>
                        <p style="margin: 2px 0 0; font-size: 0.9rem; word-break: break-word;">${sanitize(a.texto)}</p>
                    </div>
                    <button onclick="deleteAviso('${a.id}')" style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; border-radius: 0.4rem; padding: 4px 10px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; flex-shrink: 0;">Excluir</button>
                </div>
            `).join('');
        }

        async function deleteAviso(id) {
            if (!confirm('Excluir este aviso?')) return;
            try {
                await adminAction('delete_aviso', { id });
                toast('Aviso excluído.');
                await loadData();
            } catch (e) { toast('Erro: ' + e.message, 'error'); }
        }

        document.getElementById('add-aviso-btn').onclick = async function() {
            const texto = document.getElementById('new-aviso-texto').value.trim();
            const data = document.getElementById('new-aviso-data').value;
            if (!texto || !data) { toast('Preencha o texto e a data.', 'error'); return; }
            this.disabled = true;
            this.textContent = 'Adicionando...';
            try {
                await adminAction('add_aviso', { texto, data_exibicao: data });
                document.getElementById('new-aviso-texto').value = '';
                document.getElementById('new-aviso-data').value = '';
                toast('Aviso adicionado!');
                await loadData();
            } catch (e) { toast('Erro: ' + e.message, 'error'); }
            finally {
                this.disabled = false;
                this.textContent = 'Adicionar Aviso';
            }
        };

        async function init() {
            await loadData();
            await updateTasks();
            renderTasks();
        }

        checkAuth();
    </script>
</body>
</html>
