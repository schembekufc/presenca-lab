<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Presença - Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --text: #f8fafc;
            --accent: #22c55e;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at top right, #1e3a8a, transparent),
                radial-gradient(circle at bottom left, #1e1b4b, transparent);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #current-time {
            font-size: 1.2rem;
            color: var(--secondary);
            font-weight: 300;
        }

        .controls-bar {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .controls-bar select {
            background: #2d3748;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .btn-mode {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-realtime {
            background: var(--primary);
            color: #0f172a;
        }

        .btn-consult {
            background: #ffcc00;
            color: #0f172a;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 800;
            color: white;
        }

        .badge-live {
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .badge-manual {
            background: #ffcc00;
            color: #000;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .column {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .column:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .column.active {
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transform: scale(1.05);
        }

        h2 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .active h2 {
            color: var(--primary);
        }

        .time-range {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            display: block;
        }

        .presence-list {
            list-style: none;
        }

        .presence-list li {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 0.75rem;
            border-radius: 1rem;
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            animation: fadeIn 0.5s ease forwards;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .person-name {
            display: flex;
            align-items: center;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .person-name::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px var(--accent);
        }

        .task-container {
            width: 100%;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .task-item {
            font-size: 0.85rem;
            color: var(--secondary);
            line-height: 1.2;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 2px solid var(--primary);
        }

        .project-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary);
            margin-right: 6px;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            grid-column: span 3;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--secondary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .column.active {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Monitor de Presença <span id="mode-badge" class="status-badge badge-live">LIVE</span></h1>
        <p id="current-time">Carregando...</p>
    </header>

    <div class="controls-bar">
        <div class="control-group">
            <button id="toggle-mode" class="btn-mode btn-realtime">Modo: Real-Time</button>
        </div>
        <div class="control-group">
            <label for="select-day">Dia:</label>
            <select id="select-day">
                <option value="1">Segunda-feira</option>
                <option value="2">Terça-feira</option>
                <option value="3">Quarta-feira</option>
                <option value="4">Quinta-feira</option>
                <option value="5">Sexta-feira</option>
            </select>
        </div>
        <div class="control-group">
            <label for="select-hour">Hora:</label>
            <select id="select-hour"></select>
        </div>
    </div>

    <div class="container" id="app-container">
        <div class="loading">Sincronizando com Google Sheets...</div>
    </div>

    <script>
        const SHEET_ID = '1NdSMN26GilAADXI8S4h9fmn9yiUUSEuJmwWlGMnjbzE';
        const GID_HORARIOS = '1651859946';
        const GID_MONO = '766295141';
        const GID_VW = '146544989';

        const URL_HORARIOS = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_HORARIOS}`;
        const URL_MONO = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_MONO}`;
        const URL_VW = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID_VW}`;

        const DAYS_MAP = { 1: [1, 9], 2: [9, 17], 3: [17, 25], 4: [25, 33], 5: [33, 40] };
        const DAY_NAMES = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        let cachedTasks = {};
        let isRealTime = true;
        let globalSheetData = null;

        const selectDay = document.getElementById('select-day');
        const selectHour = document.getElementById('select-hour');
        const btnToggle = document.getElementById('toggle-mode');
        const modeBadge = document.getElementById('mode-badge');

        for (let i = 8; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `${i.toString().padStart(2, '0')}:00`;
            selectHour.appendChild(opt);
        }

        function updateModeUI() {
            if (isRealTime) {
                btnToggle.className = "btn-mode btn-realtime";
                btnToggle.innerText = "Modo: Real-Time";
                modeBadge.className = "status-badge badge-live";
                modeBadge.innerText = "LIVE";
                const now = new Date();
                const d = now.getDay();
                selectDay.value = (d === 0 || d === 6) ? 1 : d;
                selectHour.value = now.getHours();
            } else {
                btnToggle.className = "btn-mode btn-consult";
                btnToggle.innerText = "Voltar ao Real-Time";
                modeBadge.className = "status-badge badge-manual";
                modeBadge.innerText = "CONSULTA";
            }
        }

        btnToggle.addEventListener('click', () => {
            isRealTime = !isRealTime;
            updateModeUI();
            if (globalSheetData) updateUI(globalSheetData);
        });

        [selectDay, selectHour].forEach(el => el.addEventListener('change', () => {
            isRealTime = false;
            updateModeUI();
            if (globalSheetData) updateUI(globalSheetData);
        }));

        async function fetchCSV(url) {
            try {
                const response = await fetch(url);
                const csvText = await response.text();
                // Divide por linha respeitando \n ou \r\n
                const lines = csvText.split(/\r?\n/);
                return lines.map(line => {
                    const result = [];
                    let cur = '', inQuote = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') inQuote = !inQuote;
                        else if (char === ',' && !inQuote) {
                            result.push(cur.trim());
                            cur = '';
                        } else cur += char;
                    }
                    result.push(cur.trim());
                    return result.map(cell => cell.replace(/^"|"$/g, '').trim());
                });
            } catch (error) {
                console.error("Erro ao carregar CSV:", error);
                return null;
            }
        }

        async function updateTasks() {
            const [monoData, vwData] = await Promise.all([fetchCSV(URL_MONO), fetchCSV(URL_VW)]);
            const taskMap = {};
            const processTab = (data, proj) => {
                if (!data) return;
                // Ignora o cabeçalho
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (row.length < 5) continue;
                    const task = row[2], resp = row[4];
                    if (task && resp && resp.toLowerCase() !== "responsavel" && task.toLowerCase() !== "descrição da tarefa") {
                        // Divide por vírgula e limpa nomes
                        resp.split(',').forEach(n => {
                            const name = n.trim().replace(/^"|"$/g, '').trim();
                            if (name) {
                                if (!taskMap[name]) taskMap[name] = [];
                                // Evita duplicados
                                if (!taskMap[name].find(t => t.task === task)) {
                                    taskMap[name].push({ task, project: proj });
                                }
                            }
                        });
                    }
                }
            };
            processTab(monoData, "Bancada Mono");
            processTab(vwData, "Bancada VW");
            cachedTasks = taskMap;
        }

        function getPeopleForHour(data, weekday, hour) {
            const range = DAYS_MAP[weekday];
            if (!range) return [];
            const [start, end] = range;
            let rowData = null;
            for (let i = 0; i < data.length; i++) {
                const hours = (data[i][0] || "").match(/\d+/g);
                if (hours && hours.length >= 2 && hour >= parseInt(hours[0]) && hour < parseInt(hours[1])) {
                    rowData = data[i]; break;
                }
            }
            if (!rowData) return [];
            const res = [];
            for (let j = start; j < end; j++) {
                const v = rowData[j];
                if (v && v.toLowerCase() !== "nan" && v.toLowerCase() !== "horas") res.push(v);
            }
            return [...new Set(res)].sort();
        }

        function updateUI(data) {
            globalSheetData = data;
            const now = new Date();
            let weekday = isRealTime ? now.getDay() : parseInt(selectDay.value);
            let hour = isRealTime ? now.getHours() : parseInt(selectHour.value);

            if (isRealTime) {
                document.getElementById('current-time').innerText = `${DAY_NAMES[weekday]}, ${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
                selectDay.value = (weekday === 0 || weekday === 6) ? 1 : weekday;
                selectHour.value = hour;
            } else {
                document.getElementById('current-time').innerText = `Consultando: ${DAY_NAMES[weekday]} às ${hour}:00`;
            }

            const container = document.getElementById('app-container');
            container.innerHTML = '';

            [hour - 1, hour, hour + 1].forEach((h, idx) => {
                const labels = isRealTime ? ['HORA PASSADA', 'AGORA', 'PRÓXIMA HORA'] : ['HORA ANTERIOR', 'HORÁRIO SELECIONADO', 'HORA SEGUINTE'];
                const people = getPeopleForHour(data, (weekday === 0 || weekday === 6) ? 1 : weekday, h);
                const col = document.createElement('div');
                col.className = `column ${idx === 1 ? 'active' : ''}`;
                col.innerHTML = `<h2>${labels[idx]}</h2><span class="time-range">${h.toString().padStart(2, '0')}:00 - ${(h + 1).toString().padStart(2, '0')}:00</span><ul class="presence-list"></ul>`;
                const ul = col.querySelector('ul');
                if (people.length === 0) {
                    ul.innerHTML = '<li style="opacity:0.5; font-size:0.9rem;">Ninguém escalado</li>';
                } else {
                    people.forEach(name => {
                        const li = document.createElement('li');
                        let html = `<div class="person-name">${name}</div>`;
                        const tasks = cachedTasks[name] || [];
                        if (tasks.length > 0) {
                            html += '<div class="task-container">' + tasks.map(t => `<div class="task-item"><span class="project-tag">${t.project}</span> ${t.task}</div>`).join('') + '</div>';
                        }
                        li.innerHTML = html; ul.appendChild(li);
                    });
                }
                container.appendChild(col);
            });
        }

        async function init() {
            updateModeUI();
            await updateTasks();
            const data = await fetchCSV(URL_HORARIOS);
            if (data) {
                updateUI(data);
                setInterval(async () => { await updateTasks(); const d = await fetchCSV(URL_HORARIOS); if (d) updateUI(d); }, 300000);
                setInterval(() => { if (isRealTime) updateUI(globalSheetData); }, 60000);
            }
        }
        init();
    </script>
</body>

</html>
