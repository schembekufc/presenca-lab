<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividades dos Bolsistas - Lab 718</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --text: #f8fafc;
            --accent: #22c55e;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            background-image: radial-gradient(circle at top right, #1e3a8a, transparent),
                radial-gradient(circle at bottom left, #1e1b4b, transparent);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #current-time {
            font-size: 1.3rem;
            color: var(--secondary);
            font-weight: 300;
        }

        .controls-bar {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .controls-bar select {
            background: #2d3748;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .btn-mode {
            padding: 0.6rem 0;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: center;
            flex: 1;
        }

        .btn-admin {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-admin:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-schedule {
            background: #818cf8;
            color: white;
            border: none;
        }

        .btn-schedule:hover {
            background: #6366f1;
        }

        .btn-realtime {
            background: var(--primary);
            color: #0f172a;
        }

        .btn-consult {
            background: #ffcc00;
            color: #0f172a;
        }

        .status-badge {
            font-size: 0.85rem;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            font-weight: 800;
            color: white;
        }

        .badge-live {
            background: #ef4444;
            animation: pulse 2s infinite;
        }

        .badge-manual {
            background: #ffcc00;
            color: #000;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .column {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .column:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            text-align: center;
        }

        .active h2 {
            color: var(--primary);
        }

        .time-range {
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1.5rem;
            display: block;
        }

        .presence-list {
            list-style: none;
        }

        .presence-list li {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 0.75rem;
            border-radius: 1rem;
            font-size: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            animation: fadeIn 0.5s ease forwards;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .person-name {
            display: flex;
            align-items: center;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .person-name::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px var(--accent);
        }

        .task-container {
            width: 100%;
            padding-left: 20px;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .task-item {
            font-size: 1rem;
            color: var(--secondary);
            line-height: 1.2;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border-left: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .task-deadline {
            font-size: 0.75rem;
            color: var(--secondary);
            font-weight: bold;
            margin-top: 2px;
        }

        .status-atrasado { border-left-color: #ef4444 !important; }
        .status-atrasado .task-deadline { color: #ef4444; }
        
        .status-urgente { border-left-color: #f59e0b !important; } /* Laranja */
        .status-urgente .task-deadline { color: #f59e0b; }
        
        .status-em-dia { border-left-color: #22c55e !important; } /* Verde */
        .status-em-dia .task-deadline { color: #cbd5e1; }
        
        .status-sem-prazo { border-left-color: #38bdf8 !important; } /* Azul */
        .status-sem-prazo .task-deadline { color: var(--primary); }

        .priority-tag {
            font-size: 0.75rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 6px;
            text-transform: uppercase;
        }
        .priority-alta { background: rgba(239, 68, 68, 0.2); color: #fee2e2; border: 1px solid #ef4444; }
        .priority-media { background: rgba(245, 158, 11, 0.2); color: #fef3c7; border: 1px solid #f59e0b; }
        .priority-baixa { background: rgba(34, 197, 94, 0.2); color: #dcfce7; border: 1px solid #22c55e; }

        .project-tag {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary);
            margin-right: 6px;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            grid-column: span 3;
            padding: 3rem;
            font-size: 1.2rem;
            color: var(--secondary);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .column.active {
                transform: scale(1);
            }
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            padding: 2rem 1rem;
            overflow-y: auto;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .grid-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 2rem;
        }

        .individual-grid {
            display: grid;
            grid-template-columns: 52px repeat(5, minmax(44px, 1fr));
            gap: 6px;
            min-width: 320px;
        }

        .grid-header {
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            padding: 6px 2px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .grid-time {
            font-size: 0.8rem;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-cell {
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 0.75rem;
        }

        @media (max-width: 480px) {
            .modal-content {
                padding: 1.2rem 0.8rem;
                border-radius: 1rem;
            }
        }

        .cell-active {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: bold;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            cursor: pointer;
            color: var(--secondary);
            font-size: 1.5rem;
        }

        .individual-selector {
            background: #2d3748;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem;
            border-radius: 0.5rem;
            outline: none;
        }

        /* Notice Board */
        .notice-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 2rem;
            animation: fadeIn 0.8s ease;
        }

        .notice-card {
            background: rgba(245, 158, 11, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 1rem;
            padding: 1.2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .notice-icon {
            background: #f59e0b;
            color: #0f172a;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
            animation: pulse-notice 2s infinite;
        }

        .notice-content {
            flex: 1;
        }

        .notice-title {
            color: #fbbf24;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .notice-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #cbd5e1;
        }

        @keyframes pulse-notice {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        /* Toast Notifications */
        #toast-container { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
        .toast { padding:0.75rem 1.25rem; border-radius:0.75rem; font-size:0.9rem; font-weight:600; backdrop-filter:blur(12px); max-width:340px; text-align:center; animation:toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; }
        .toast-success { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.4); color:#22c55e; }
        .toast-error   { background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.4); color:#ef4444; }
        .toast-warn    { background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.4); color:#f59e0b; }
        @keyframes toastIn  { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;} }

        /* Botões de ação nas tarefas */
        .task-item { position: relative !important; padding-right: 50px !important; }
        .btn-task-edit, .btn-task-complete { position:absolute; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:0.75rem; opacity:0.2; padding:3px; transition:opacity 0.2s; line-height:1; }
        .btn-task-edit { right:4px; }
        .btn-task-complete { right:26px; color:#22c55e; font-weight:bold; font-size:0.9rem; }
        .task-item:hover .btn-task-edit,
        .task-item:hover .btn-task-complete { opacity:0.8; }
        .btn-task-edit:hover, .btn-task-complete:hover { opacity:1 !important; }

        /* Modal de edição de tarefa */
        .edit-label { font-size:0.8rem; color:var(--secondary); display:block; margin-bottom:0.3rem; }
        .edit-input { width:100%; background:#0f172a; color:var(--text); border:1px solid rgba(255,255,255,0.15); border-radius:0.5rem; padding:0.5rem 0.7rem; font-family:inherit; font-size:0.9rem; outline:none; }
        .edit-input:focus { border-color:var(--primary); }

    </style>
</head>

<body>

    <header>
        <h1>Atividades dos Bolsistas - Lab 718</h1>
        <p id="current-time">Carregando...</p>
    </header>

    <div class="controls-bar">
        <div class="control-group" style="width:100%;">
            <button id="toggle-mode" class="btn-mode btn-realtime">Modo: Real-Time</button>
            <button id="btn-view-individual" class="btn-mode btn-schedule">Horário Individual</button>
            <button id="admin-btn" class="btn-mode btn-admin">Administrador</button>
        </div>
        <div class="control-group">
            <label for="select-day">Dia:</label>
            <select id="select-day">
                <option value="1">Segunda-feira</option>
                <option value="2">Terça-feira</option>
                <option value="3">Quarta-feira</option>
                <option value="4">Quinta-feira</option>
                <option value="5">Sexta-feira</option>
            </select>
        </div>
        <div class="control-group">
            <label for="select-hour">Hora:</label>
            <select id="select-hour"></select>
        </div>
    </div>

    <div class="container" id="app-container">
        <div class="loading">Sincronizando com Google Sheets...</div>
    </div>

    <div class="notice-container" id="notice-board" style="display: none; margin-top: 1rem;">
        <div class="notice-card">
            <div class="notice-icon">📢</div>
            <div class="notice-content">
                <div class="notice-title">Quadro de Avisos</div>
                <div class="notice-text" id="notice-text">Carregando avisos...</div>
            </div>
        </div>
    </div>

    <!-- Modal Horário Individual -->
    <div id="modal-individual" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 0.5rem;">Horário Semanal</h2>
            <div class="control-group" style="justify-content: flex-start; margin-bottom: 1.5rem;">
                <label>Selecionar Pessoa:</label>
                <select id="select-person-individual" class="individual-selector"></select>
            </div>
            <div class="grid-wrapper"><div class="individual-grid" id="schedule-grid">
                <!-- Preenchido via JS -->
            </div></div>
        </div>
    </div>


    <script>        const SUPABASE_URL = 'https://vnodbsefjwvapvtdzgdl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZub2Ric2Vmand2YXB2dGR6Z2RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzI5NTMsImV4cCI6MjA4ODk0ODk1M30.M-7v57-obulKagTn-p5Pp6oKJWwcuu5FIvSLJ6andvs';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const DAY_NAMES = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

        let cachedTasks = [];
        let finishedTasks = [];
        let allParticipants = [];
        let projectsList = [];
        let isRealTime = true;
        let isAdminAuthenticated = sessionStorage.getItem('isAdminAuthenticated') === 'true';
        let editingTaskId = null;

        const selectDay = document.getElementById('select-day');
        const selectHour = document.getElementById('select-hour');
        const btnToggle = document.getElementById('toggle-mode');

        for (let i = 8; i <= 20; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.innerText = `${i.toString().padStart(2, '0')}:00`;
            selectHour.appendChild(opt);
        }

        function sanitize(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str ?? ''));
            return div.innerHTML;
        }

        function updateModeUI() {
            if (isRealTime) {
                btnToggle.className = "btn-mode btn-realtime";
                btnToggle.innerText = "Modo: Real-Time";
            } else {
                btnToggle.className = "btn-mode btn-consult";
                btnToggle.innerText = "Voltar ao Real-Time";
            }
        }

        async function loadData() {
            // Carregar aviso
            const { data: notices } = await supabaseClient.from('configuracoes').select('*').eq('chave', 'aviso_principal').single();
            const noticeBoard = document.getElementById('notice-board');
            if (notices && notices.valor) {
                document.getElementById('notice-text').innerText = notices.valor;
                noticeBoard.style.display = 'block';
            } else {
                noticeBoard.style.display = 'none';
            }

            const { data: projs } = await supabaseClient.from('projetos').select('*').order('nome');
            projectsList = projs || [];
            
            const { data: parts } = await supabaseClient.from('bolsistas').select('*').order('nome');
            allParticipants = parts || [];

            const sel = document.getElementById('select-person-individual');
            sel.innerHTML = '<option value="">-- Selecione uma pessoa --</option>' +
                allParticipants.map(p => `<option value="${p.id}">${sanitize(p.nome)}</option>`).join('');
            
            // Limpar grid inicial
            document.getElementById('schedule-grid').innerHTML = '<p style="grid-column: span 6; text-align:center; padding:20px; opacity:0.5;">Escolha alguém acima para ver o horário.</p>';
        }

        async function updateTasks() {
            const { data: active } = await supabaseClient
                .from('tarefas')
                .select('*, projetos(nome)')
                .not('status', 'in', '("concluida","excluida")');
            
            if (active) {
                const priorityWeight = { 'alta': 1, 'media': 2, 'baixa': 3 };
                active.sort((a, b) => {
                    // 1. Prioridade (Alta > Media > Baixa)
                    const pa = priorityWeight[a.prioridade?.toLowerCase()] || 4;
                    const pb = priorityWeight[b.prioridade?.toLowerCase()] || 4;
                    if (pa !== pb) return pa - pb;

                    // 2. Projeto (A-Z)
                    const projA = (a.projetos?.nome || "").toLowerCase();
                    const projB = (b.projetos?.nome || "").toLowerCase();
                    if (projA !== projB) return projA.localeCompare(projB);

                    // 3. Tarefa (A-Z)
                    return (a.descricao || "").toLowerCase().localeCompare((b.descricao || "").toLowerCase());
                });
            }
            cachedTasks = active || [];
        
            const { data: done } = await supabaseClient
                .from('tarefas')
                .select('*, projetos(nome)')
                .eq('status', 'concluida')
                .order('created_at', { ascending: false })
                .limit(20);
            finishedTasks = done || [];
        }

        async function getPeopleForHour(weekday, hour) {
            const { data: scales } = await supabaseClient
                .from('escalas')
                .select('*, bolsistas(nome)')
                .eq('dia_semana', weekday)
                .lte('hora_inicio', hour)
                .gt('hora_fim', hour);
            return (scales || []).map(s => s.bolsistas.nome).sort();
        }

        async function updateUI() {
            const now = new Date();
            let weekday = isRealTime ? now.getDay() : parseInt(selectDay.value);
            let hour = isRealTime ? now.getHours() : parseInt(selectHour.value);

            if (weekday === 0 || weekday === 6) weekday = 1;

            if (isRealTime) {
                document.getElementById('current-time').innerText = `${DAY_NAMES[weekday]}, ${now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
                selectDay.value = weekday;
                selectHour.value = hour;
            } else {
                document.getElementById('current-time').innerText = `Consultando: ${DAY_NAMES[weekday]} às ${hour}:00`;
            }

            const container = document.getElementById('app-container');
            container.innerHTML = '<div class="loading">Consultando banco de dados...</div>';

            const people = await getPeopleForHour(weekday, hour);
            
            container.innerHTML = '';
            const label = isRealTime ? 'AGORA' : 'HORÁRIO SELECIONADO';
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `<h2>${label}</h2><span class="time-range">${hour.toString().padStart(2, '0')}:00 - ${(hour + 1).toString().padStart(2, '0')}:00</span><ul class="presence-list"></ul>`;
            const ul = col.querySelector('ul');

            if (people.length === 0) {
                ul.innerHTML = '<li style="opacity:0.5; font-size:0.9rem;">Ninguém escalado</li>';
            } else {
                people.forEach(name => {
                    const li = document.createElement('li');
                    let html = `<div class="person-name">${sanitize(name)}</div>`;
                    const tasks = cachedTasks.filter(t => t.responsaveis.includes(name));
                    if (tasks.length > 0) {
                        html += '<div class="task-container">' + tasks.map(t => {
                            const prazoDate = t.prazo ? new Date(t.prazo + 'T23:59:59') : null;
                            const hoje = new Date();
                            hoje.setHours(0, 0, 0, 0);
                            
                            let statusClass = 'status-sem-prazo';
                            if (prazoDate) {
                                const diffTime = prazoDate - hoje;
                                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                
                                if (diffDays < 0) statusClass = 'status-atrasado';
                                else if (diffDays <= 7) statusClass = 'status-urgente';
                                else statusClass = 'status-em-dia';
                            }
                            
                            let deadlineHtml = t.prazo ? `<div class="task-deadline">📅 Prazo: ${new Date(t.prazo + 'T12:00:00').toLocaleDateString('pt-BR')}</div>` : '';
                            let priorityHtml = `<span class="priority-tag priority-${t.prioridade || 'media'}">${sanitize(t.prioridade || 'média')}</span>`;

                            return `<div class="task-item ${statusClass}"><button class="btn-task-complete" onclick="requestCompleteTask('${t.id}')" title="Concluir tarefa">✓</button><button class="btn-task-edit" onclick="requestEditTask('${t.id}')" title="Editar tarefa">✏️</button>${priorityHtml}<span class="project-tag">${sanitize(t.projetos.nome)}</span> ${sanitize(t.descricao)}${deadlineHtml}</div>`;
                        }).join('') + '</div>';
                    }
                    li.innerHTML = html; ul.appendChild(li);
                });
            }
            container.appendChild(col);
        }

        async function init() {
            updateModeUI();
            await loadData();
            await updateTasks();
            await updateUI();
            setInterval(async () => { await updateTasks(); await updateUI(); }, 60000);
        }

        btnToggle.addEventListener('click', () => { isRealTime = !isRealTime; updateModeUI(); updateUI(); });
        [selectDay, selectHour].forEach(el => el.addEventListener('change', () => { isRealTime = false; updateModeUI(); updateUI(); }));

        const adminBtn = document.getElementById('admin-btn');
        adminBtn.addEventListener('click', () => { window.location.href = 'admin.html'; });

        // Lógica horários individuais
        const btnIndividual = document.getElementById('btn-view-individual');
        const modalIndividual = document.getElementById('modal-individual');
        const closeModal = document.getElementById('close-modal');
        const selectIndiv = document.getElementById('select-person-individual');

        btnIndividual.onclick = () => {
            modalIndividual.style.display = 'flex';
            renderIndividualSchedule();
        }

        closeModal.onclick = () => modalIndividual.style.display = 'none';
        selectIndiv.onchange = () => renderIndividualSchedule();

        async function renderIndividualSchedule() {
            const personId = selectIndiv.value;
            const grid = document.getElementById('schedule-grid');
            
            if (!personId) {
                grid.innerHTML = '<p style="grid-column: span 6; text-align:center; padding:20px; opacity:0.5;">Escolha alguém acima para ver o horário.</p>';
                return;
            }

            grid.innerHTML = '<div class="loading">Carregando horários...</div>';

            const { data: scales } = await supabaseClient
                .from('escalas')
                .select('*')
                .eq('bolsista_id', personId);

            grid.innerHTML = '<div></div>'; // Espaço vazio no topo esquerdo
            const dias = ["SEG", "TER", "QUA", "QUI", "SEX"];
            dias.forEach(d => grid.innerHTML += `<div class="grid-header">${d}</div>`);

            for (let h = 8; h <= 19; h++) {
                grid.innerHTML += `<div class="grid-time">${h}:00</div>`;
                for (let d = 1; d <= 5; d++) {
                    const active = scales.some(s => s.dia_semana === d && h >= s.hora_inicio && h < s.hora_fim);
                    grid.innerHTML += `<div class="grid-cell ${active ? 'cell-active' : ''}">${active ? 'LAB' : ''}</div>`;
                }
            }
        }

        // Toast
        function toast(message, type = 'success') {
            let c = document.getElementById('toast-container');
            if (!c) { c = document.createElement('div'); c.id = 'toast-container'; document.body.appendChild(c); }
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            el.textContent = message;
            c.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // Modal de confirmação
        function confirmModal(message, confirmText = 'Confirmar', confirmStyle = '') {
            return new Promise(resolve => {
                const modal = document.getElementById('confirm-modal-index');
                document.getElementById('confirm-message-index').textContent = message;
                const okBtn = document.getElementById('confirm-ok-index');
                okBtn.textContent = confirmText;
                okBtn.style.cssText = confirmStyle || '';
                modal.style.display = 'flex';
                const close = (result) => { modal.style.display = 'none'; resolve(result); };
                okBtn.onclick = () => close(true);
                document.getElementById('confirm-cancel-index').onclick = () => close(false);
            });
        }

        // PIN + Edição/Conclusão de tarefa
        let pendingPinCallback = null;

        function requestEditTask(taskId) {
            if (isAdminAuthenticated) {
                openTaskEditModal(taskId);
            } else {
                pendingPinCallback = () => openTaskEditModal(taskId);
                document.getElementById('pin-input').value = '';
                document.getElementById('pin-error').style.display = 'none';
                document.getElementById('pin-modal').style.display = 'flex';
                setTimeout(() => document.getElementById('pin-input').focus(), 50);
            }
        }

        function closePinModal() {
            document.getElementById('pin-modal').style.display = 'none';
            pendingPinCallback = null;
        }

        function submitPin() {
            if (document.getElementById('pin-input').value === '0718') {
                isAdminAuthenticated = true;
                sessionStorage.setItem('isAdminAuthenticated', 'true');
                document.getElementById('pin-modal').style.display = 'none';
                if (pendingPinCallback) { pendingPinCallback(); pendingPinCallback = null; }
            } else {
                document.getElementById('pin-error').style.display = 'block';
            }
        }

        function openTaskEditModal(taskId) {
            const task = cachedTasks.find(t => t.id === taskId);
            if (!task) return;
            editingTaskId = taskId;

            const projSel = document.getElementById('edit-task-project');
            projSel.innerHTML = '<option value="">-- Selecione --</option>' +
                projectsList.map(p => `<option value="${p.id}" ${p.id === task.projeto_id ? 'selected' : ''}>${sanitize(p.nome)}</option>`).join('');

            document.getElementById('edit-task-desc').value = task.descricao || '';
            document.getElementById('edit-task-start').value = task.data_inicio || '';
            document.getElementById('edit-task-deadline').value = task.prazo || '';
            document.getElementById('edit-task-priority').value = task.prioridade || 'media';

            const respsContainer = document.getElementById('edit-task-resps');
            respsContainer.innerHTML = allParticipants.map(p => `
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:3px 0;font-size:0.9rem;">
                    <input type="checkbox" value="${sanitize(p.nome)}" ${task.responsaveis?.includes(p.nome) ? 'checked' : ''} style="width:auto;"> ${sanitize(p.nome)}
                </label>
            `).join('');

            document.getElementById('task-edit-modal').style.display = 'flex';
        }

        function requestCompleteTask(taskId) {
            if (isAdminAuthenticated) {
                completeTaskFlow(taskId);
            } else {
                pendingPinCallback = () => completeTaskFlow(taskId);
                document.getElementById('pin-input').value = '';
                document.getElementById('pin-error').style.display = 'none';
                document.getElementById('pin-modal').style.display = 'flex';
                setTimeout(() => document.getElementById('pin-input').focus(), 50);
            }
        }

        async function completeTaskFlow(taskId) {
            const task = cachedTasks.find(t => t.id === taskId);
            const desc = task?.descricao || '';
            if (!await confirmModal(`Marcar como concluída?\n"${desc}"`, 'Concluir', 'background:var(--accent); color:white; flex:1;')) return;
            try {
                const { error } = await supabaseClient.from('tarefas').update({ status: 'concluida' }).eq('id', taskId);
                if (error) throw error;
                toast('Tarefa concluída!');
                await updateTasks();
                await updateUI();
            } catch(e) {
                toast('Erro: ' + e.message, 'error');
            }
        }

        function closeTaskEditModal() {
            document.getElementById('task-edit-modal').style.display = 'none';
            editingTaskId = null;
        }

        async function saveEditedTask() {
            const projeto_id = document.getElementById('edit-task-project').value;
            const descricao = document.getElementById('edit-task-desc').value.trim();
            const resps = Array.from(document.querySelectorAll('#edit-task-resps input:checked')).map(cb => cb.value);
            const data_inicio = document.getElementById('edit-task-start').value;
            const prazo = document.getElementById('edit-task-deadline').value || null;
            const prioridade = document.getElementById('edit-task-priority').value;

            if (!projeto_id) return toast('Selecione um projeto!', 'warn');
            if (!descricao) return toast('Preencha a descrição!', 'warn');
            if (resps.length === 0) return toast('Selecione ao menos um responsável!', 'warn');

            const btn = document.getElementById('edit-save-btn');
            btn.disabled = true; btn.textContent = 'Salvando...';
            try {
                const { error } = await supabaseClient.from('tarefas')
                    .update({ projeto_id, descricao, responsaveis: resps, data_inicio, prazo, prioridade })
                    .eq('id', editingTaskId);
                if (error) throw error;
                toast('Tarefa atualizada!');
                closeTaskEditModal();
                await updateTasks();
                await updateUI();
            } catch(e) {
                toast('Erro: ' + e.message, 'error');
                btn.disabled = false; btn.textContent = 'Salvar';
            }
        }

        init();
    </script>

    <!-- Modal de Confirmação -->
    <div id="confirm-modal-index" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.88); backdrop-filter:blur(8px); z-index:3100; align-items:center; justify-content:center; padding:1rem;">
        <div style="background:var(--card-bg); border:1px solid rgba(255,255,255,0.1); border-radius:1.2rem; padding:1.8rem 1.5rem; width:100%; max-width:340px; text-align:center;">
            <p id="confirm-message-index" style="font-size:1rem; margin-bottom:1.5rem; line-height:1.5; color:var(--text); white-space:pre-line;"></p>
            <div style="display:flex; gap:10px;">
                <button id="confirm-cancel-index" style="flex:1; padding:0.7rem; border-radius:0.5rem; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--text); cursor:pointer; font-family:inherit; font-weight:600;">Cancelar</button>
                <button id="confirm-ok-index" style="flex:1; padding:0.7rem; border-radius:0.5rem; border:none; cursor:pointer; font-family:inherit; font-weight:700;">Confirmar</button>
            </div>
        </div>
    </div>

    <!-- PIN Modal -->
    <div id="pin-modal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.9); backdrop-filter:blur(8px); z-index:3000; align-items:center; justify-content:center; padding:1rem;">
        <div style="background:var(--card-bg); border:1px solid rgba(255,255,255,0.1); border-radius:1.2rem; padding:1.8rem 1.5rem; width:100%; max-width:300px; text-align:center;">
            <p style="font-size:1rem; margin-bottom:1rem; color:var(--text); font-weight:600;">PIN de Administrador</p>
            <input type="password" id="pin-input" placeholder="Digite o PIN" autocomplete="current-password"
                class="edit-input" style="text-align:center; letter-spacing:0.3rem; font-size:1.2rem;"
                onkeydown="if(event.key==='Enter') submitPin()">
            <p id="pin-error" style="color:#ef4444; font-size:0.8rem; display:none; margin-top:0.5rem;">PIN incorreto!</p>
            <div style="display:flex; gap:10px; margin-top:1rem;">
                <button onclick="closePinModal()" style="flex:1; padding:0.6rem; border-radius:0.5rem; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--text); cursor:pointer; font-family:inherit; font-weight:600;">Cancelar</button>
                <button onclick="submitPin()" style="flex:1; padding:0.6rem; border-radius:0.5rem; border:none; background:var(--primary); color:#0f172a; font-weight:700; cursor:pointer; font-family:inherit;">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de Edição de Tarefa -->
    <div id="task-edit-modal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.9); backdrop-filter:blur(8px); z-index:3000; align-items:flex-start; justify-content:center; padding:1.5rem; overflow-y:auto;">
        <div style="background:var(--card-bg); border:1px solid rgba(255,255,255,0.1); border-radius:1.2rem; padding:1.8rem 1.5rem; width:100%; max-width:420px; margin:auto;">
            <h3 style="color:var(--primary); margin-bottom:1.5rem; font-size:1.1rem;">Editar Tarefa</h3>
            <div style="display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <label class="edit-label">Projeto</label>
                    <select id="edit-task-project" class="edit-input"></select>
                </div>
                <div>
                    <label class="edit-label">Descrição</label>
                    <textarea id="edit-task-desc" rows="3" class="edit-input" style="resize:vertical;"></textarea>
                </div>
                <div>
                    <label class="edit-label">Responsáveis</label>
                    <div id="edit-task-resps" style="background:#0f172a; border:1px solid rgba(255,255,255,0.15); border-radius:0.5rem; padding:0.5rem; max-height:130px; overflow-y:auto;"></div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                    <div>
                        <label class="edit-label">Início</label>
                        <input type="date" id="edit-task-start" class="edit-input">
                    </div>
                    <div>
                        <label class="edit-label">Prazo</label>
                        <input type="date" id="edit-task-deadline" class="edit-input">
                    </div>
                </div>
                <div>
                    <label class="edit-label">Prioridade</label>
                    <select id="edit-task-priority" class="edit-input">
                        <option value="alta">Alta</option>
                        <option value="media">Média</option>
                        <option value="baixa">Baixa</option>
                    </select>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:1.5rem;">
                <button onclick="closeTaskEditModal()" style="flex:1; padding:0.7rem; border-radius:0.5rem; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:var(--text); cursor:pointer; font-family:inherit; font-weight:600;">Cancelar</button>
                <button id="edit-save-btn" onclick="saveEditedTask()" style="flex:1; padding:0.7rem; border-radius:0.5rem; border:none; background:var(--accent); color:white; cursor:pointer; font-family:inherit; font-weight:700;">Salvar</button>
            </div>
        </div>
    </div>

</body>
</html>
